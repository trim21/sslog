name: build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  dist-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
          activate-environment: true

      - run: uv build

      - name: Check Files
        run: uvx twine check --strict dist/*
